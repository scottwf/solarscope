<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Heatmap - SolarScope</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0a0a; color: #f0ebe7; font-family: 'DM Sans', sans-serif; }
    .card { background: #141414; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; }
    .muted { color: #9b918c; }
    .stat-value { font-family: 'DM Mono', monospace; }
    a.nav-link { color: #0ea5e9; font-size: 0.875rem; text-decoration: none; }
    a.nav-link:hover { color: #38bdf8; }
    .legend-box { width: 28px; height: 28px; border-radius: 6px; }
    .heatmap-cell {
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 500;
      color: rgba(255,255,255,0.85); text-decoration: none;
      transition: transform 0.1s, box-shadow 0.15s;
    }
    .heatmap-cell:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(255,255,255,0.1);
      z-index: 10;
      position: relative;
    }
    .month-label { font-family: 'DM Sans', sans-serif; font-weight: 700; color: #9b918c; font-size: 13px; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="container mx-auto p-4">
    <div class="flex flex-row justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Energy Heatmap</h1>
      <a href="/dashboard" class="nav-link">Back to Dashboard</a>
    </div>

    <!-- Legend -->
    <div class="card p-4 mb-6">
      <h2 class="text-base font-semibold mb-3">Legend</h2>
      <div class="flex flex-wrap gap-6">
        <div class="flex items-center gap-2">
          <div class="legend-box" style="background-color: #1e3a8a;"></div>
          <span class="text-sm muted">Heavy Usage</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="legend-box" style="background-color: #3b82f6;"></div>
          <span class="text-sm muted">Slight Deficit</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="legend-box" style="background-color: #6ee7b7;"></div>
          <span class="text-sm muted">Slight Surplus</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="legend-box" style="background-color: #15803d;"></div>
          <span class="text-sm muted">Heavy Surplus</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="legend-box" style="background-color: rgba(255,255,255,0.06);"></div>
          <span class="text-sm muted">No Data</span>
        </div>
      </div>
    </div>

    <!-- Heatmap Container -->
    <div class="card p-6 overflow-x-auto">
      <div id="heatmapContainer" class="inline-block"></div>
    </div>
  </div>

  <script>
    async function loadHeatmapData() {
      const res = await fetch('/heatmap/data', { credentials: 'include' });
      const data = await res.json();
      renderHeatmap(data);
    }

    function getColorForDay(usage, generation) {
      if (usage === 0 && generation === 0) return 'rgba(255,255,255,0.04)';
      const ratio = (generation - usage) / Math.max(generation, usage, 1);
      if (ratio < -0.3) return '#1e3a8a';
      if (ratio < 0) return '#3b82f6';
      if (ratio < 0.3) return '#6ee7b7';
      return '#15803d';
    }

    function getTextColor(usage, generation) {
      if (usage === 0 && generation === 0) return 'rgba(255,255,255,0.15)';
      const ratio = (generation - usage) / Math.max(generation, usage, 1);
      // Dark text on light green, light text on dark backgrounds
      if (ratio >= 0 && ratio < 0.3) return 'rgba(0,0,0,0.6)';
      return 'rgba(255,255,255,0.85)';
    }

    function renderHeatmap(data) {
      const container = document.getElementById('heatmapContainer');

      // Group data by month
      const monthMap = {};
      data.forEach(day => {
        const date = new Date(day.date);
        const monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        const monthName = date.toLocaleString('default', { month: 'short', year: 'numeric' });

        if (!monthMap[monthKey]) {
          monthMap[monthKey] = { name: monthName, days: [] };
        }
        monthMap[monthKey].days.push(day);
      });

      let html = '<div style="display: flex; gap: 24px; align-items: flex-start;">';

      Object.values(monthMap).forEach(month => {
        html += `<div style="display: flex; flex-direction: column;">`;
        html += `<div class="month-label" style="margin-bottom: 10px; text-align: center; min-width: 50px;">${month.name}</div>`;
        html += `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">`;

        month.days.forEach(day => {
          const color = getColorForDay(day.usage, day.generation);
          const textColor = getTextColor(day.usage, day.generation);
          const date = new Date(day.date);
          const dayNum = date.getDate();
          const surplus = day.generation - day.usage;
          const tooltip = `${day.date}: ${day.usage.toFixed(1)} kWh usage, ${day.generation.toFixed(1)} kWh gen (${surplus > 0 ? '+' : ''}${surplus.toFixed(1)} kWh)`;

          html += `<a
            href="/dashboard?date=${day.date}"
            class="heatmap-cell"
            style="background-color: ${color}; color: ${textColor};"
            title="${tooltip}"
          >${dayNum}</a>`;
        });

        html += '</div></div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }

    document.addEventListener('DOMContentLoaded', loadHeatmapData);
  </script>
</body>
</html>
