<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Heatmap - SolarScope</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div class="container mx-auto p-4">
    <div class="flex flex-row justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Energy Heatmap</h1>
      <a href="/dashboard" class="text-sm text-blue-600 hover:underline">Back to Dashboard</a>
    </div>

    <!-- Legend -->
    <div class="bg-white rounded shadow p-4 mb-6">
      <h2 class="text-lg font-semibold mb-3">Legend</h2>
      <div class="flex flex-wrap gap-6">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded" style="background-color: #1e3a8a;"></div>
          <span class="text-sm">Heavy Usage (usage &gt; generation)</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded" style="background-color: #93c5fd;"></div>
          <span class="text-sm">Slight Deficit (usage ≥ generation)</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded" style="background-color: #86efac;"></div>
          <span class="text-sm">Slight Surplus (generation &gt; usage)</span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded" style="background-color: #15803d;"></div>
          <span class="text-sm">Heavy Surplus (generation &gt;&gt; usage)</span>
        </div>
      </div>
    </div>

    <!-- Heatmap Container -->
    <div class="bg-white rounded shadow p-6 overflow-x-auto">
      <div id="heatmapContainer" class="inline-block"></div>
    </div>
  </div>

  <script>
    async function loadHeatmapData() {
      const res = await fetch('/heatmap/data', { credentials: 'include' });
      const data = await res.json();
      renderHeatmap(data);
    }

    function getColorForDay(usage, generation) {
      // Calculate the ratio of generation to usage
      // Negative values mean more usage, positive mean more generation
      const ratio = (generation - usage) / Math.max(generation, usage, 1);

      if (ratio < -0.3) {
        // Heavy usage (more than 30% more usage)
        return '#1e3a8a'; // Dark blue
      } else if (ratio < 0) {
        // Slight deficit
        return '#93c5fd'; // Light blue
      } else if (ratio < 0.3) {
        // Slight surplus (up to 30% more generation)
        return '#86efac'; // Light green
      } else {
        // Heavy surplus (more than 30% more generation)
        return '#15803d'; // Dark green
      }
    }

    function renderHeatmap(data) {
      const container = document.getElementById('heatmapContainer');

      // Group data by month
      const monthMap = {};
      data.forEach(day => {
        const date = new Date(day.date);
        const monthKey = date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
        const monthName = date.toLocaleString('default', { month: 'short', year: 'numeric' });

        if (!monthMap[monthKey]) {
          monthMap[monthKey] = { name: monthName, days: [] };
        }
        monthMap[monthKey].days.push(day);
      });

      // Create month columns
      let html = '<div style="display: flex; gap: 20px; align-items: flex-start;">';

      Object.values(monthMap).forEach(month => {
        html += `<div style="display: flex; flex-direction: column;">`;
        html += `<div style="font-weight: bold; margin-bottom: 8px; text-align: center; min-width: 50px;">${month.name}</div>`;
        html += `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">`;

        month.days.forEach(day => {
          const color = getColorForDay(day.usage, day.generation);
          const date = new Date(day.date);
          const dayNum = date.getDate();
          const surplus = day.generation - day.usage;
          const tooltip = `${day.date}: ${day.usage.toFixed(1)} kWh usage, ${day.generation.toFixed(1)} kWh generation (${surplus > 0 ? '+' : ''}${surplus.toFixed(1)} kWh)`;

          html += `<a
            href="/dashboard?date=${day.date}"
            style="
              width: 30px;
              height: 30px;
              background-color: ${color};
              border-radius: 4px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 11px;
              color: white;
              font-weight: bold;
              text-decoration: none;
              cursor: pointer;
              transition: transform 0.1s;
            "
            title="${tooltip}"
            onmouseover="this.style.transform='scale(1.2)'"
            onmouseout="this.style.transform='scale(1)'"
          >${dayNum}</a>`;
        });

        html += '</div></div>';
      });

      html += '</div>';
      container.innerHTML = html;
    }

    // Load data on page load
    document.addEventListener('DOMContentLoaded', loadHeatmapData);
  </script>
</body>
</html>
