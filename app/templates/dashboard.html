<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolarScope Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.1.0/dist/chartjs-plugin-zoom.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0a0a; color: #f0ebe7; font-family: 'DM Sans', sans-serif; }
    .card { background: #141414; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; }
    .card-inner { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; }
    .stat-value { font-family: 'DM Mono', monospace; }
    .muted { color: #9b918c; }
    .nav-btn { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); color: #f0ebe7; border-radius: 8px; transition: background 0.15s; }
    .nav-btn:hover { background: #252525; }
    .toggle-active { background: #0ea5e9 !important; color: white !important; border-color: #0ea5e9 !important; }
    .toggle-inactive { background: #1a1a1a; color: #9b918c; border: 1px solid rgba(255,255,255,0.08); }
    input[type="date"] { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); color: #f0ebe7; border-radius: 8px; font-family: 'DM Mono', monospace; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    a.nav-link { color: #0ea5e9; font-size: 0.875rem; text-decoration: none; transition: color 0.15s; }
    a.nav-link:hover { color: #38bdf8; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="container mx-auto p-4">
    <div class="flex flex-row justify-between items-center mb-4">
      <h1 class="text-2xl font-bold" style="color: #f0ebe7;">SolarScope Dashboard</h1>
      <div class="flex gap-4">
        <a href="/heatmap" class="nav-link">Heatmap</a>
        <a href="/yoy-analysis" class="nav-link">Year-Over-Year</a>
        <a href="/roi-dashboard" class="nav-link">ROI Dashboard</a>
        <a href="/admin" class="nav-link">Admin Panel</a>
      </div>
    </div>
    <!-- Responsive Dashboard Layout -->
    <div class="flex flex-col md:flex-row gap-6">
      <!-- Desktop Sidebar for Cards and ROI -->
      <aside class="hidden md:flex md:flex-col md:gap-4 md:w-64 md:shrink-0 md:sticky md:top-4 md:max-h-[calc(100vh-2rem)] md:overflow-y-auto">
        <div id="summaryCards" class="flex flex-col gap-4"></div>
        <!-- ROI Summary Section (Desktop Sidebar) -->
        <div class="card p-3">
          <h2 class="text-sm font-bold mb-3" style="color: #f0ebe7;">☀️ Solar ROI</h2>
          <div id="roiSummary" class="grid grid-cols-1 gap-3">
            <div class="card-inner p-2">
              <div class="text-xs muted">Total Savings</div>
              <div id="roiTotalSavings" class="text-base font-bold stat-value" style="color: #10b981;">--</div>
            </div>
            <div class="card-inner p-2">
              <div class="text-xs muted">Monthly Average</div>
              <div id="roiMonthlySavings" class="text-base font-bold stat-value" style="color: #10b981;">--</div>
            </div>
            <div class="card-inner p-2">
              <div class="text-xs muted">Net Metering Credit</div>
              <div id="roiNetMeteringCredit" class="text-sm font-bold stat-value" style="color: #0ea5e9;">--</div>
            </div>
            <div class="card-inner p-2">
              <div class="text-xs muted">Total Generation</div>
              <div id="roiGeneration" class="text-sm font-bold stat-value" style="color: #f59e0b;">--</div>
            </div>
          </div>
          <div id="roiMessage" class="text-xs muted mt-2 italic"></div>
        </div>
      </aside>
      <!-- Main Content -->
      <main class="flex-1 flex flex-col gap-4">
        <!-- Navigation Controls at Top -->
        <div class="card flex flex-col md:flex-row items-center justify-between w-full gap-3 p-4">
          <div class="flex items-center justify-center gap-2">
            <button id="prevBtn" class="nav-btn px-3 py-1">&#8592;</button>
            <input type="date" id="datePicker" class="px-2 py-1 text-center text-sm" />
            <button id="nextBtn" class="nav-btn px-3 py-1">&#8594;</button>
          </div>
          <div class="flex items-center justify-center gap-4">
            <div class="inline-flex rounded-lg overflow-hidden" id="viewToggle">
              <button id="dayToggle" class="toggle-active px-3 py-1 text-sm font-medium">Day</button>
              <button id="weekToggle" class="toggle-inactive px-3 py-1 text-sm font-medium">Week</button>
            </div>
            <div class="flex gap-1" id="rangeButtons">
              <button id="rangeToday" class="nav-btn px-3 py-1 text-sm">Today</button>
              <button id="rangeWeek" class="nav-btn px-3 py-1 text-sm">This Week</button>
            </div>
          </div>
        </div>

        <!-- Chart -->
        <div class="card p-4">
          <canvas id="mainChart" class="w-full h-48"></canvas>
          <div id="summary" class="text-xs text-center muted mt-2 stat-value"></div>
        </div>

        <!-- Mobile Cards Below Chart -->
        <div id="summaryCardsMobile" class="grid grid-cols-1 xs:grid-cols-2 gap-3 md:hidden sticky top-16 z-10"></div>

        <!-- Mobile ROI Summary (hidden on desktop) -->
        <div class="md:hidden card p-3">
          <h2 class="text-base font-bold mb-3" style="color: #f0ebe7;">☀️ Solar ROI Summary</h2>
          <div id="roiSummaryMobile" class="grid grid-cols-2 gap-3">
            <div class="card-inner p-2">
              <div class="text-xs muted">Total Savings</div>
              <div id="roiTotalSavingsMobile" class="text-lg font-bold stat-value" style="color: #10b981;">--</div>
            </div>
            <div class="card-inner p-2">
              <div class="text-xs muted">Monthly Average</div>
              <div id="roiMonthlySavingsMobile" class="text-lg font-bold stat-value" style="color: #10b981;">--</div>
            </div>
            <div class="card-inner p-2">
              <div class="text-xs muted">Net Metering Credit</div>
              <div id="roiNetMeteringCreditMobile" class="text-base font-bold stat-value" style="color: #0ea5e9;">--</div>
            </div>
            <div class="card-inner p-2">
              <div class="text-xs muted">Total Generation</div>
              <div id="roiGenerationMobile" class="text-base font-bold stat-value" style="color: #f59e0b;">--</div>
            </div>
          </div>
          <div id="roiMessageMobile" class="text-xs muted mt-2 italic"></div>
        </div>
      </main>
    </div>
    <script>
    async function fetchSummary(period) {
      let res = await fetch(`/summary/totals/${period}`);
      return await res.json();
    }
    function cardHtml(period, data) {
      let periodLabel = {year:'Year', month:'Month', week:'Week'}[period];
      let usage = data.total_usage ? data.total_usage.toLocaleString(undefined, {maximumFractionDigits:0}) : '0';
      let gen = data.total_generation ? data.total_generation.toLocaleString(undefined, {maximumFractionDigits:0}) : '0';
      let cost = (data.usage_cost !== undefined && data.usage_cost !== null)
          ? `$${data.usage_cost.toLocaleString(undefined, {maximumFractionDigits:0})}` : null;
      let partial = '';
      return `<div class="card p-2 sm:p-3 flex flex-col items-center text-xs sm:text-sm w-full">
        <div class="font-semibold mb-1" style="color: #f0ebe7;">This ${periodLabel}</div>
        <div class="text-xs muted">${data.start && data.end ? `${data.start} to ${data.end}` : 'No data available'}</div>
        <div class="flex flex-row gap-2 my-1">
          <div class="text-center">
            <div class="text-base sm:text-lg font-bold stat-value" style="color: #0ea5e9;">${usage} kWh</div>
            <div class="text-xs muted">Usage</div>
          </div>
          <div class="text-center">
            <div class="text-base sm:text-lg font-bold stat-value" style="color: #10b981;">${gen} kWh</div>
            <div class="text-xs muted">Generation</div>
          </div>
        </div>
        ${cost ? `<div class="text-xs sm:text-sm muted">Est. Cost: <span class="font-semibold stat-value" style="color: #f59e0b;">${cost}</span></div>` : ''}
        ${partial}
      </div>`;
    }
    async function renderSummaryCards() {
      let periods = ['year','month','week'];
      let cards = await Promise.all(periods.map(p => fetchSummary(p)));
      let html = cards.map((data,i) => cardHtml(periods[i], data)).join('');
      if (document.getElementById('summaryCards')) document.getElementById('summaryCards').innerHTML = html;
      if (document.getElementById('summaryCardsMobile')) document.getElementById('summaryCardsMobile').innerHTML = html;
    }
    renderSummaryCards();
    </script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      function formatDate(date) {
        return date.toISOString().split('T')[0];
      }

      // --- Chart.js Setup (shadcn dark style) ---
      let chart;
      const chartElem = document.getElementById('mainChart');
      if (!chartElem) { console.error('Chart canvas #mainChart not found!'); return; }
      const ctx = chartElem.getContext('2d');

      function renderChart(labels, usage, solar) {
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Power Usage (kWh)',
                data: usage,
                backgroundColor: 'rgba(14,165,233,0.35)',
                borderColor: 'transparent',
                borderWidth: 0,
                borderRadius: 6,
                borderSkipped: false,
                yAxisID: 'y',
              },
              {
                label: 'Solar Generation (kWh)',
                data: solar,
                backgroundColor: 'rgba(16,185,129,0.35)',
                borderColor: 'transparent',
                borderWidth: 0,
                borderRadius: 6,
                borderSkipped: false,
                yAxisID: 'y',
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                position: 'top',
                labels: {
                  color: '#9b918c',
                  font: { family: "'DM Sans', sans-serif", size: 12 },
                  usePointStyle: true,
                  pointStyle: 'rectRounded',
                  padding: 20
                }
              },
              tooltip: {
                mode: 'index',
                intersect: false,
                backgroundColor: '#1a1a1a',
                borderColor: 'rgba(255,255,255,0.08)',
                borderWidth: 1,
                cornerRadius: 8,
                caretSize: 0,
                titleColor: '#f0ebe7',
                bodyColor: '#9b918c',
                titleFont: { family: "'DM Mono', monospace", size: 12 },
                bodyFont: { family: "'DM Mono', monospace", size: 11 },
                padding: 12
              },
              zoom: {
                zoom: { wheel: { enabled: true, speed: 0.1 }, pinch: { enabled: true }, mode: 'xy' },
                pan: { enabled: true, mode: 'xy' },
                limits: { x: { min: 'original', max: 'original' }, y: { min: 'original', max: 'original' } }
              }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            scales: {
              x: {
                grid: { display: false },
                border: { display: false },
                ticks: { color: '#9b918c', font: { family: "'DM Mono', monospace", size: 10 }, maxRotation: 45, autoSkip: true, maxTicksLimit: 24 }
              },
              y: {
                grid: { color: 'rgba(255,255,255,0.04)' },
                border: { display: false },
                beginAtZero: true,
                ticks: { color: '#9b918c', font: { family: "'DM Mono', monospace", size: 10 } }
              }
            }
          }
        });
      }

      // --- UI State ---
      let mode = 'day';
      const urlParams = new URLSearchParams(window.location.search);
      const paramDate = urlParams.get('date');
      let selectedDate = paramDate || formatDate(new Date());

      const dayToggle = document.getElementById('dayToggle');
      const weekToggle = document.getElementById('weekToggle');
      function updateToggleButtons() {
        if (mode === 'day') {
          dayToggle.className = 'toggle-active px-3 py-1 text-sm font-medium';
          weekToggle.className = 'toggle-inactive px-3 py-1 text-sm font-medium';
        } else {
          weekToggle.className = 'toggle-active px-3 py-1 text-sm font-medium';
          dayToggle.className = 'toggle-inactive px-3 py-1 text-sm font-medium';
        }
      }
      dayToggle.onclick = () => { if (mode !== 'day') { mode = 'day'; updateToggleButtons(); updateChart(); } };
      weekToggle.onclick = () => { if (mode !== 'week') { mode = 'week'; updateToggleButtons(); updateChart(); } };
      updateToggleButtons();

      document.getElementById('rangeToday').onclick = () => {
        selectedDate = formatDate(new Date());
        mode = 'day';
        document.getElementById('datePicker').value = selectedDate;
        updateToggleButtons();
        updateChart();
      };
      document.getElementById('rangeWeek').onclick = () => {
        selectedDate = formatDate(new Date());
        mode = 'week';
        document.getElementById('datePicker').value = selectedDate;
        updateToggleButtons();
        updateChart();
      };

      document.getElementById('datePicker').onchange = (e) => {
        selectedDate = e.target.value;
        mode = 'day';
        updateToggleButtons();
        updateChart();
      };

    document.getElementById('prevBtn').onclick = () => {
      let d = new Date(selectedDate);
      if (mode === 'day') { d.setDate(d.getDate() - 1); } else { d.setDate(d.getDate() - 7); }
      selectedDate = formatDate(d);
      document.getElementById('datePicker').value = selectedDate;
      updateChart();
    };
    document.getElementById('nextBtn').onclick = () => {
      let d = new Date(selectedDate);
      if (mode === 'day') { d.setDate(d.getDate() + 1); } else { d.setDate(d.getDate() + 7); }
      selectedDate = formatDate(d);
      document.getElementById('datePicker').value = selectedDate;
      updateChart();
    };

    function processData(usageData, solarData, mode) {
      let labels = [];
      let usage = [];
      let solar = [];
      if (mode === 'day') {
        labels = [];
        for (let hour = 0; hour < 24; hour++) {
          for (let min = 0; min < 60; min += 15) {
            labels.push(String(hour).padStart(2, '0') + ':' + String(min).padStart(2, '0'));
          }
        }
        const usageMap = Object.fromEntries(usageData.map(row => [row.timestamp.slice(11, 16), row.power]));
        const solarMap = Object.fromEntries(solarData.map(row => [row.timestamp.slice(11, 16), row.energy]));
        usage = labels.map(label => usageMap[label] || 0);
        solar = labels.map(label => solarMap[label] || 0);
      } else {
        const usageByDay = {};
        const solarByDay = {};
        usageData.forEach(row => {
          const day = row.timestamp.slice(0, 10);
          usageByDay[day] = (usageByDay[day] || 0) + row.power;
        });
        solarData.forEach(row => {
          const day = row.timestamp.slice(0, 10);
          solarByDay[day] = (solarByDay[day] || 0) + row.energy;
        });
        labels = Object.keys(usageByDay).length > 0 ? Object.keys(usageByDay) : Object.keys(solarByDay);
        usage = labels.map(day => usageByDay[day] || 0);
        solar = labels.map(day => solarByDay[day] || 0);
      }
      return { labels, usage, solar };
    }

    async function fetchData(start, end) {
      const usageRes = await fetch(`/power-usage?start=${start}&end=${end}`, { credentials: 'include' });
      const usageData = await usageRes.json();
      const solarRes = await fetch(`/solar-generation?start=${start}&end=${end}`, { credentials: 'include' });
      const solarData = await solarRes.json();
      return { usageData, solarData };
    }

    async function updateChart() {
      let start, end;
      if (mode === 'day') {
        start = end = selectedDate;
      } else {
        const d = new Date(selectedDate);
        const weekAgo = new Date(d.getTime() - 6 * 24 * 60 * 60 * 1000);
        start = formatDate(weekAgo);
        end = formatDate(d);
      }
      const { usageData, solarData } = await fetchData(start, end);
      const { labels, usage, solar } = processData(usageData, solarData, mode);
      renderChart(labels, usage, solar);
      const totalUsage = usage.reduce((a, b) => a + b, 0).toFixed(2);
      const totalSolar = solar.reduce((a, b) => a + b, 0).toFixed(2);
      document.getElementById('summary').textContent = `Total Usage: ${totalUsage} kWh | Total Solar: ${totalSolar} kWh`;
    }

    async function updateROI() {
      try {
        const res = await fetch('/roi/summary', { credentials: 'include' });
        if (!res.ok) {
          document.getElementById('roiMessage').textContent = 'Import billing history to see ROI calculations';
          if (document.getElementById('roiMessageMobile')) {
            document.getElementById('roiMessageMobile').textContent = 'Import billing history to see ROI calculations';
          }
          return;
        }
        const data = await res.json();
        document.getElementById('roiTotalSavings').textContent = '$' + data.total_savings.toFixed(2);
        document.getElementById('roiMonthlySavings').textContent = '$' + data.monthly_savings.toFixed(2);
        document.getElementById('roiNetMeteringCredit').textContent = '$' + data.net_metering_credit.toFixed(2);
        document.getElementById('roiGeneration').textContent = data.total_generation_kwh.toLocaleString() + ' kWh';
        document.getElementById('roiMessage').textContent = `Solar system installed: ${data.solar_start_date}`;
        if (document.getElementById('roiTotalSavingsMobile')) {
          document.getElementById('roiTotalSavingsMobile').textContent = '$' + data.total_savings.toFixed(2);
          document.getElementById('roiMonthlySavingsMobile').textContent = '$' + data.monthly_savings.toFixed(2);
          document.getElementById('roiNetMeteringCreditMobile').textContent = '$' + data.net_metering_credit.toFixed(2);
          document.getElementById('roiGenerationMobile').textContent = data.total_generation_kwh.toLocaleString() + ' kWh';
          document.getElementById('roiMessageMobile').textContent = `Solar system installed: ${data.solar_start_date}`;
        }
      } catch (e) {
        document.getElementById('roiMessage').textContent = 'ROI data not available yet';
        if (document.getElementById('roiMessageMobile')) {
          document.getElementById('roiMessageMobile').textContent = 'ROI data not available yet';
        }
      }
    }

    document.getElementById('datePicker').value = selectedDate;
    updateChart();
    updateROI();
  });
  </script>
</body>
</html>
