<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolarScope Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.1.0/dist/chartjs-plugin-zoom.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div class="container mx-auto p-4">
    <div class="flex flex-row justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">SolarScope Dashboard</h1>
      <div class="flex gap-4">
        <a href="/yoy-analysis" class="text-sm text-blue-600 hover:underline">Year-Over-Year</a>
        <a href="/roi-dashboard" class="text-sm text-blue-600 hover:underline">ROI Dashboard</a>
        <a href="/admin" class="text-sm text-blue-600 hover:underline">Admin Panel</a>
      </div>
    </div>
    <!-- Responsive Dashboard Layout -->
    <div class="flex flex-col md:flex-row gap-6">
      <!-- Desktop Sidebar for Cards -->
      <aside class="hidden md:flex md:flex-col md:gap-4 md:w-64 md:shrink-0 md:sticky md:top-4 md:max-h-[calc(100vh-2rem)] md:overflow-y-auto">
        <div id="summaryCards" class="flex flex-col gap-4"></div>
      </aside>
      <!-- Main Content -->
      <main class="flex-1 flex flex-col gap-4">
        <!-- Chart and Controls at Top -->
        <div class="bg-white rounded shadow p-4 order-1">
          <canvas id="mainChart" class="w-full h-48"></canvas>
          <div id="summary" class="text-xs text-center text-gray-600 mt-2"></div>
        </div>
        <div class="flex items-center justify-center w-full md:w-auto gap-2 order-2">
          <button id="prevBtn" class="px-2 py-1 rounded bg-gray-200 text-gray-700 hover:bg-gray-300">&#8592;</button>
          <input type="date" id="datePicker" class="border rounded px-2 py-1 text-center" />
          <button id="nextBtn" class="px-2 py-1 rounded bg-gray-200 text-gray-700 hover:bg-gray-300">&#8594;</button>
          <div class="ml-4 inline-flex rounded border bg-gray-200" id="viewToggle">
            <button id="dayToggle" class="px-2 py-1 rounded-l bg-blue-500 text-white">Day</button>
            <button id="weekToggle" class="px-2 py-1 rounded-r text-gray-700">Week</button>
          </div>
          <div class="ml-4 flex gap-1" id="rangeButtons">
            <button id="rangeToday" class="px-2 py-1 rounded bg-gray-100">Today</button>
            <button id="rangeWeek" class="px-2 py-1 rounded bg-gray-100">This Week</button>
          </div>
        </div>
        <!-- Mobile Cards Below Chart -->
        <div id="summaryCardsMobile" class="grid grid-cols-1 xs:grid-cols-2 gap-3 mt-4 md:hidden sticky top-16 z-10"></div>

        <!-- ROI Summary Section -->
        <div class="bg-gradient-to-r from-green-50 to-blue-50 rounded shadow p-4 mt-6 border border-green-200">
          <h2 class="text-lg font-bold text-gray-800 mb-4">☀️ Solar ROI Summary</h2>
          <div id="roiSummary" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white rounded p-3 shadow-sm">
              <div class="text-xs text-gray-600">Total Savings</div>
              <div id="roiTotalSavings" class="text-2xl font-bold text-green-600">--</div>
            </div>
            <div class="bg-white rounded p-3 shadow-sm">
              <div class="text-xs text-gray-600">Monthly Average</div>
              <div id="roiMonthlySavings" class="text-2xl font-bold text-green-600">--</div>
            </div>
            <div class="bg-white rounded p-3 shadow-sm">
              <div class="text-xs text-gray-600">Net Metering Credit</div>
              <div id="roiNetMeteringCredit" class="text-xl font-bold text-blue-600">--</div>
            </div>
            <div class="bg-white rounded p-3 shadow-sm">
              <div class="text-xs text-gray-600">Total Generation</div>
              <div id="roiGeneration" class="text-xl font-bold text-orange-600">--</div>
            </div>
          </div>
          <div id="roiMessage" class="text-xs text-gray-600 mt-3 italic"></div>
        </div>
      </main>
    </div>
    <script>
    async function fetchSummary(period) {
      let res = await fetch(`/summary/totals/${period}`);
      return await res.json();
    }
    function cardHtml(period, data) {
      let periodLabel = {year:'Year', month:'Month', week:'Week'}[period];
      let usage = data.total_usage ? data.total_usage.toLocaleString(undefined, {maximumFractionDigits:0}) : '0';
      let gen = data.total_generation ? data.total_generation.toLocaleString(undefined, {maximumFractionDigits:0}) : '0';
      let cost = (data.usage_cost !== undefined && data.usage_cost !== null)
          ? `$${data.usage_cost.toLocaleString(undefined, {maximumFractionDigits:0})}` : null;
      // No partial data warning needed; always show actual available range
      let partial = '';
      return `<div class="bg-white shadow rounded p-2 sm:p-3 flex flex-col items-center text-xs sm:text-sm w-full">
        <div class="font-semibold text-gray-700 mb-1">This ${periodLabel}</div>
        <div class="text-xs text-gray-500">${data.start && data.end ? `${data.start} to ${data.end}` : 'No data available'}</div>
        <div class="flex flex-row gap-2 my-1">
          <div class="text-center">
            <div class="text-base sm:text-lg font-bold text-blue-700">${usage} kWh</div>
            <div class="text-xs text-gray-500">Usage</div>
          </div>
          <div class="text-center">
            <div class="text-base sm:text-lg font-bold text-green-700">${gen} kWh</div>
            <div class="text-xs text-gray-500">Generation</div>
          </div>
        </div>
        ${cost ? `<div class="text-xs sm:text-sm text-gray-600">Est. Cost: <span class="font-semibold">${cost}</span></div>` : ''}
        ${partial}
      </div>`;
    }
    async function renderSummaryCards() {
      let periods = ['year','month','week'];
      let cards = await Promise.all(periods.map(p => fetchSummary(p)));
      let html = cards.map((data,i) => cardHtml(periods[i], data)).join('');
      // Desktop sidebar
      if (document.getElementById('summaryCards')) document.getElementById('summaryCards').innerHTML = html;
      // Mobile grid
      if (document.getElementById('summaryCardsMobile')) document.getElementById('summaryCardsMobile').innerHTML = html;
    }
    renderSummaryCards();
    </script>
    <script>
    // Ensure all dashboard JS runs after DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
      // Utility: format date to YYYY-MM-DD
      function formatDate(date) {
        return date.toISOString().split('T')[0];
      }

      // --- Chart.js Setup ---
      let chart;
      const chartElem = document.getElementById('mainChart');
      if (!chartElem) {
        console.error('Chart canvas #mainChart not found!');
        return;
      }
      const ctx = chartElem.getContext('2d');
      function renderChart(labels, usage, solar) {
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [
              {
                label: 'Power Usage (kWh)',
                data: usage,
                backgroundColor: 'rgba(59,130,246,0.5)',
                borderColor: 'rgba(59,130,246,1)',
                borderWidth: 1,
                yAxisID: 'y',
              },
              {
                label: 'Solar Generation (kWh)',
                data: solar,
                backgroundColor: 'rgba(16,185,129,0.4)',
                borderColor: 'rgba(16,185,129,1)',
                borderWidth: 1,
                yAxisID: 'y',
              }
            ]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'top' },
              tooltip: { mode: 'index', intersect: false },
              zoom: {
                zoom: {
                  wheel: { enabled: true, speed: 0.1 },
                  pinch: { enabled: true },
                  mode: 'xy'
                },
                pan: {
                  enabled: true,
                  mode: 'xy'
                },
                limits: {
                  x: { min: 'original', max: 'original' },
                  y: { min: 'original', max: 'original' }
                }
              }
            },
            interaction: { mode: 'nearest', axis: 'x', intersect: false },
            scales: {
              x: { title: { display: true, text: 'Time' } },
              y: { title: { display: true, text: 'Energy (kWh)' }, beginAtZero: true }
            }
          }
        });
      }

      // --- UI State ---
      let mode = 'day'; // 'day' or 'week'
      let selectedDate = formatDate(new Date());

      const dayToggle = document.getElementById('dayToggle');
      const weekToggle = document.getElementById('weekToggle');
      function updateToggleButtons() {
        if (mode === 'day') {
          dayToggle.classList.add('bg-blue-500','text-white');
          weekToggle.classList.remove('bg-blue-500','text-white');
        } else {
          weekToggle.classList.add('bg-blue-500','text-white');
          dayToggle.classList.remove('bg-blue-500','text-white');
        }
      }
      dayToggle.onclick = () => { if (mode !== 'day') { mode = 'day'; updateToggleButtons(); updateChart(); } };
      weekToggle.onclick = () => { if (mode !== 'week') { mode = 'week'; updateToggleButtons(); updateChart(); } };
      updateToggleButtons();

      document.getElementById('rangeToday').onclick = () => {
        selectedDate = formatDate(new Date());
        mode = 'day';
        document.getElementById('datePicker').value = selectedDate;
        updateToggleButtons();
        updateChart();
      };
      document.getElementById('rangeWeek').onclick = () => {
        selectedDate = formatDate(new Date());
        mode = 'week';
        document.getElementById('datePicker').value = selectedDate;
        updateToggleButtons();
        updateChart();
      };
      
      document.getElementById('datePicker').onchange = (e) => {
        selectedDate = e.target.value;
        mode = 'day';
        updateToggleButtons();
        updateChart();
      };

    // Navigation buttons
    document.getElementById('prevBtn').onclick = () => {
      let d = new Date(selectedDate);
      if (mode === 'day') {
        d.setDate(d.getDate() - 1);
      } else {
        d.setDate(d.getDate() - 7);
      }
      selectedDate = formatDate(d);
      document.getElementById('datePicker').value = selectedDate;
      updateChart();
    };
    document.getElementById('nextBtn').onclick = () => {
      let d = new Date(selectedDate);
      if (mode === 'day') {
        d.setDate(d.getDate() + 1);
      } else {
        d.setDate(d.getDate() + 7);
      }
      selectedDate = formatDate(d);
      document.getElementById('datePicker').value = selectedDate;
      updateChart();
    };

    // Process usage and solar data for chart
    function processData(usageData, solarData, mode) {
      let labels = [];
      let usage = [];
      let solar = [];
      if (mode === 'day') {
        // Group by 15-min interval
        labels = usageData.map(row => row.timestamp.slice(11, 16));
        usage = usageData.map(row => row.power);
        // Solar: match by timestamp
        const solarMap = Object.fromEntries(solarData.map(row => [row.timestamp, row.energy]));
        solar = usageData.map(row => solarMap[row.timestamp] || 0);
      } else {
        // Group by date, sum
        const usageByDay = {};
        const solarByDay = {};
        usageData.forEach(row => {
          const day = row.timestamp.slice(0, 10);
          usageByDay[day] = (usageByDay[day] || 0) + row.power;
        });
        solarData.forEach(row => {
          const day = row.timestamp.slice(0, 10);
          solarByDay[day] = (solarByDay[day] || 0) + row.energy;
        });
        labels = Object.keys(usageByDay);
        usage = labels.map(day => usageByDay[day]);
        solar = labels.map(day => solarByDay[day] || 0);
      }
      return { labels, usage, solar };
    }

    // Fetch usage and solar data for a date range
    async function fetchData(start, end) {
      const usageRes = await fetch(`/power-usage?start=${start}&end=${end}`, { credentials: 'include' });
      const usageData = await usageRes.json();
      const solarRes = await fetch(`/solar-generation?start=${start}&end=${end}`, { credentials: 'include' });
      const solarData = await solarRes.json();
      return { usageData, solarData };
    }

    async function updateChart() {
      let start, end;
      if (mode === 'day') {
        start = end = selectedDate;
      } else {
        const d = new Date(selectedDate);
        const weekAgo = new Date(d.getTime() - 6 * 24 * 60 * 60 * 1000);
        start = formatDate(weekAgo);
        end = formatDate(d);
      }
      const { usageData, solarData } = await fetchData(start, end);
      const { labels, usage, solar } = processData(usageData, solarData, mode);
      renderChart(labels, usage, solar);
      // Update summary
      const totalUsage = usage.reduce((a, b) => a + b, 0).toFixed(2);
      const totalSolar = solar.reduce((a, b) => a + b, 0).toFixed(2);
      document.getElementById('summary').textContent = `Total Usage: ${totalUsage} kWh | Total Solar: ${totalSolar} kWh`;
    }

    // Fetch and display ROI summary
    async function updateROI() {
      try {
        const res = await fetch('/roi/summary', { credentials: 'include' });
        if (!res.ok) {
          document.getElementById('roiMessage').textContent = 'Import billing history to see ROI calculations';
          return;
        }
        const data = await res.json();

        document.getElementById('roiTotalSavings').textContent = '$' + data.total_savings.toFixed(2);
        document.getElementById('roiMonthlySavings').textContent = '$' + data.monthly_savings.toFixed(2);
        document.getElementById('roiNetMeteringCredit').textContent = '$' + data.net_metering_credit.toFixed(2);
        document.getElementById('roiGeneration').textContent = data.total_generation_kwh.toLocaleString() + ' kWh';
        document.getElementById('roiMessage').textContent = `Solar system installed: ${data.solar_start_date}`;
      } catch (e) {
        document.getElementById('roiMessage').textContent = 'ROI data not available yet';
      }
    }

    // Initial load
    updateChart();
    updateROI();
  }); // Close DOMContentLoaded handler
  </script>
</body>
</html>
