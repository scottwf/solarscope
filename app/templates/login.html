<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolarScope - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-blue-500 to-blue-600 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- Login Card -->
    <div class="bg-white rounded-lg shadow-lg p-8">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">SolarScope</h1>
        <p class="text-gray-600 text-sm mt-1">Solar & Utility Monitoring Dashboard</p>
      </div>

      {% if error %}
      <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" class="space-y-4">
        <!-- Username -->
        <div>
          <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
            Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="Enter username"
            autocomplete="username"
          />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
            placeholder="Enter password"
            autocomplete="current-password"
          />
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200"
        >
          Login
        </button>
      </form>

      <!-- Help Text -->
      <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
        <p class="text-gray-600 text-xs">
          <strong>Default Credentials:</strong><br>
          Username: <code class="bg-gray-200 px-1 rounded">admin</code><br>
          Password: <code class="bg-gray-200 px-1 rounded">admin</code><br>
          <em class="text-gray-500">Change these in the Admin Panel after login.</em>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-white text-sm">
      <p>&copy; 2025 SolarScope. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
