<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year-Over-Year Analysis - SolarScope</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.1.0/dist/chartjs-plugin-zoom.umd.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { background: #0a0a0a; color: #f0ebe7; font-family: 'DM Sans', sans-serif; }
    .card { background: #141414; border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; }
    .muted { color: #9b918c; }
    .stat-value { font-family: 'DM Mono', monospace; }
    .month-btn { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.08); color: #9b918c; border-radius: 8px; transition: all 0.15s; cursor: pointer; }
    .month-btn:hover { background: #252525; color: #f0ebe7; }
    .month-btn.active { background: #8b5cf6 !important; color: white !important; border-color: #8b5cf6 !important; }
    .radio-label { color: #9b918c; }
    .radio-label input:checked + span { color: #f0ebe7; }
    a.nav-link { color: #0ea5e9; font-size: 0.875rem; text-decoration: none; }
    a.nav-link:hover { color: #38bdf8; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <div class="container mx-auto p-4">
    <div class="flex flex-row justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Year-Over-Year Comparison</h1>
      <a href="/dashboard" class="nav-link">Back to Dashboard</a>
    </div>

    <!-- Month Selector -->
    <div class="card p-4 mb-6">
      <label class="block text-sm font-semibold mb-2 muted">Select Month to Compare:</label>
      <div class="flex gap-2 flex-wrap">
        <button id="monthAll" class="month-btn active px-3 py-1 text-sm">All Months</button>
      </div>
      <div id="monthButtons" class="flex gap-2 flex-wrap mt-3"></div>
    </div>

    <!-- Comparison Type Toggle -->
    <div class="card p-4 mb-6">
      <div class="flex gap-6">
        <label class="radio-label flex items-center cursor-pointer">
          <input type="radio" name="metric" value="usage" checked class="mr-2"> <span>Usage (kWh)</span>
        </label>
        <label class="radio-label flex items-center cursor-pointer">
          <input type="radio" name="metric" value="cost" class="mr-2"> <span>Cost ($)</span>
        </label>
      </div>
    </div>

    <!-- Chart -->
    <div class="card p-4">
      <canvas id="yoyChart" class="w-full h-96"></canvas>
      <div id="summary" class="text-sm muted mt-4 text-center stat-value"></div>
    </div>
  </div>

  <script>
    const COLORS = ['#8b5cf6', '#0ea5e9', '#f59e0b', '#10b981', '#e8547a', '#38bdf8', '#fb923c'];
    let allData = [];
    let chart;

    async function loadData() {
      const res = await fetch('/roi/year-over-year', { credentials: 'include' });
      allData = await res.json();
      initializeMonthButtons();
      renderChart('all', 'usage');
    }

    function initializeMonthButtons() {
      const months = ['January', 'February', 'March', 'April', 'May', 'June',
                      'July', 'August', 'September', 'October', 'November', 'December'];
      const container = document.getElementById('monthButtons');

      months.forEach(month => {
        const btn = document.createElement('button');
        btn.textContent = month;
        btn.className = 'month-btn px-2 py-1 text-sm';
        btn.onclick = () => {
          document.querySelectorAll('#monthButtons button').forEach(b => b.classList.remove('active'));
          document.getElementById('monthAll').classList.remove('active');
          btn.classList.add('active');
          renderChart(month, getMetric());
        };
        container.appendChild(btn);
      });

      document.getElementById('monthAll').onclick = () => {
        document.querySelectorAll('#monthButtons button').forEach(b => b.classList.remove('active'));
        document.getElementById('monthAll').classList.add('active');
        renderChart('all', getMetric());
      };

      document.querySelectorAll('input[name="metric"]').forEach(input => {
        input.addEventListener('change', () => renderChart(getSelectedMonth(), input.value));
      });
    }

    function getMetric() {
      return document.querySelector('input[name="metric"]:checked').value;
    }

    function getSelectedMonth() {
      const active = document.querySelector('#monthButtons button.active, #monthAll.active');
      return active ? active.textContent : 'all';
    }

    function renderChart(month, metric) {
      let chartData = month === 'all'
        ? allData
        : allData.filter(d => d.month === month);

      if (chartData.length === 0) {
        document.getElementById('summary').textContent = 'No data available for this month';
        return;
      }

      const byYear = {};
      chartData.forEach(row => {
        if (!byYear[row.year]) byYear[row.year] = [];
        byYear[row.year].push(row);
      });

      const years = Object.keys(byYear).sort();
      const labels = month === 'all'
        ? ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
        : ['Data'];

      const datasets = years.map((year, idx) => {
        const data = month === 'all'
          ? getLabelData(byYear[year], metric)
          : byYear[year].map(d => metric === 'usage' ? d.usage_kwh : d.cost);

        const isPre = byYear[year][0].period === 'pre';
        const color = COLORS[idx % COLORS.length];

        if (month === 'all') {
          // Line chart for all months
          return {
            label: `${year} ${isPre ? '(Pre-Solar)' : '(Post-Solar)'}`,
            data,
            borderColor: color,
            backgroundColor: color.replace(')', ',0.15)').replace('rgb', 'rgba').replace('#', ''),
            borderWidth: 2,
            tension: 0.4,
            fill: true,
            pointRadius: 0,
            pointHoverRadius: 4,
            // Convert hex to rgba for fill
            backgroundColor: hexToRgba(color, 0.15)
          };
        } else {
          // Bar chart for single month
          return {
            label: `${year} ${isPre ? '(Pre-Solar)' : '(Post-Solar)'}`,
            data,
            backgroundColor: hexToRgba(color, 0.35),
            borderColor: 'transparent',
            borderWidth: 0,
            borderRadius: 6,
            borderSkipped: false
          };
        }
      });

      if (chart) chart.destroy();
      const ctx = document.getElementById('yoyChart').getContext('2d');
      chart = new Chart(ctx, {
        type: month === 'all' ? 'line' : 'bar',
        data: { labels, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'top',
              labels: {
                color: '#9b918c',
                font: { family: "'DM Sans', sans-serif", size: 12 },
                usePointStyle: true,
                pointStyle: 'rectRounded',
                padding: 20
              }
            },
            title: {
              display: true,
              text: month === 'all' ? 'Monthly Usage Pattern (All Years)' : `${month} Comparison`,
              color: '#f0ebe7',
              font: { family: "'DM Sans', sans-serif", size: 16, weight: 'bold' }
            },
            tooltip: {
              backgroundColor: '#1a1a1a',
              borderColor: 'rgba(255,255,255,0.08)',
              borderWidth: 1,
              cornerRadius: 8,
              caretSize: 0,
              titleColor: '#f0ebe7',
              bodyColor: '#9b918c',
              titleFont: { family: "'DM Mono', monospace", size: 12 },
              bodyFont: { family: "'DM Mono', monospace", size: 11 },
              padding: 12
            },
            zoom: {
              zoom: { wheel: { enabled: true, speed: 0.1 }, pinch: { enabled: true }, mode: 'xy' },
              pan: { enabled: true, mode: 'xy' },
              limits: { x: { min: 'original', max: 'original' }, y: { min: 'original', max: 'original' } }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              border: { display: false },
              ticks: { color: '#9b918c', font: { family: "'DM Mono', monospace", size: 10 } }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.04)' },
              border: { display: false },
              beginAtZero: true,
              title: {
                display: true,
                text: metric === 'usage' ? 'Usage (kWh)' : 'Cost ($)',
                color: '#9b918c',
                font: { family: "'DM Sans', sans-serif", size: 12 }
              },
              ticks: { color: '#9b918c', font: { family: "'DM Mono', monospace", size: 10 } }
            }
          }
        }
      });

      updateSummary(chartData, metric);
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function getLabelData(yearData, metric) {
      const monthMap = {};
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      yearData.forEach(d => {
        const idx = d.month_num - 1;
        monthMap[months[idx]] = metric === 'usage' ? d.usage_kwh : d.cost;
      });
      return months.map(m => monthMap[m] || null);
    }

    function updateSummary(data, metric) {
      const grouped = {};
      data.forEach(d => {
        if (!grouped[d.year]) grouped[d.year] = [];
        grouped[d.year].push(d);
      });

      let summaryText = '';
      const years = Object.keys(grouped).sort();

      if (years.length >= 2) {
        const preYears = years.filter(y => grouped[y][0].period === 'pre');
        const postYears = years.filter(y => grouped[y][0].period === 'post');

        if (preYears.length > 0 && postYears.length > 0) {
          const preMean = preYears.reduce((sum, y) => {
            const val = metric === 'usage'
              ? grouped[y].reduce((s, d) => s + d.usage_kwh, 0) / grouped[y].length
              : grouped[y].reduce((s, d) => s + d.cost, 0) / grouped[y].length;
            return sum + val;
          }, 0) / preYears.length;

          const postMean = postYears.reduce((sum, y) => {
            const val = metric === 'usage'
              ? grouped[y].reduce((s, d) => s + d.usage_kwh, 0) / grouped[y].length
              : grouped[y].reduce((s, d) => s + d.cost, 0) / grouped[y].length;
            return sum + val;
          }, 0) / postYears.length;

          const pctChange = ((postMean - preMean) / preMean * 100).toFixed(1);
          const label = metric === 'usage' ? 'Usage' : 'Cost';
          summaryText = `${label} changed ${pctChange}% after solar installation (${preMean.toFixed(1)} → ${postMean.toFixed(1)})`;
        }
      }

      document.getElementById('summary').textContent = summaryText;
    }

    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
