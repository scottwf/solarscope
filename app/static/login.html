<!-- Simple login form used for authentication -->
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <!-- Tailwind CSS via CDN for basic styling -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
  <form method="post" action="/login" class="bg-white p-6 rounded shadow-md w-80">
    <h1 class="text-xl mb-4">Solar Monitor Login</h1>
    <label class="block mb-2">Username
      <input type="text" name="username" class="border p-2 w-full" required>
    </label>
    <label class="block mb-4">Password
      <input type="password" name="password" class="border p-2 w-full" required>
    </label>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 w-full">Login</button>
  </form>
</body>
</html>
